scenarios:
  # ==========================================================================
  # Scenario 1: Tag an untagged MSTest OrderProcessor test suite
  # ==========================================================================

  - name: "Tag an untagged MSTest test suite"
    prompt: >-
      I have an MSTest test project at OrderService.Tests/ with about 20 tests
      covering an OrderProcessor class. None of the tests have any category
      attributes yet. Can you analyze each test and add appropriate category
      tags? I'd also like a summary of the distribution when you're done.
    setup:
      files:
        - path: "OrderService.Tests/OrderService.Tests.csproj"
          source: "fixtures/mstest-untagged/OrderService.Tests/OrderService.Tests.csproj"
        - path: "OrderService.Tests/OrderProcessorTests.cs"
          source: "fixtures/mstest-untagged/OrderService.Tests/OrderProcessorTests.cs"
        - path: "OrderService/OrderService.csproj"
          source: "fixtures/mstest-untagged/OrderService/OrderService.csproj"
        - path: "OrderService/Order.cs"
          source: "fixtures/mstest-untagged/OrderService/Order.cs"
        - path: "OrderService/OrderProcessor.cs"
          source: "fixtures/mstest-untagged/OrderService/OrderProcessor.cs"
    assertions:
      - type: file_contains
        path: "OrderService.Tests/OrderProcessorTests.cs"
        value: "TestCategory"
      - type: output_matches
        pattern: "positive|negative"
      - type: output_matches
        pattern: "(distribution|summary|trait|count)"
    rubric:
      - "Tagged the happy-path PlaceOrder tests (ValidInput, MultipleItems, SendsConfirmationEmail) as positive"
      - "Tagged the exception-throwing tests (NullEmail, EmptyEmail, InvalidEmailFormat, etc.) as negative"
      - "Identified the boundary-adjacent tests that operate on zero, negative, or empty values (ZeroQuantity, NegativePrice, EmptyItemList, ZeroTotal, Exactly500Points) and tagged them accordingly"
      - "Used the correct MSTest attribute syntax [TestCategory(\"...\")]"
      - "Produced a summary showing the count or distribution of tags across the test suite"
      - "Every test method received at least one positive or negative tag"
    timeout: 360

